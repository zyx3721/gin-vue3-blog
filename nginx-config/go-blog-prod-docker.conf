############# 禁止直接ip访问（无CDN加速，有则注释该配置）################
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /usr/local/nginx/ssl/huangjingblog.cn/huangjingblog.cn.pem;
    ssl_certificate_key /usr/local/nginx/ssl/huangjingblog.cn/huangjingblog.cn.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 444;
}
##########################################################################

# 80 强制跳转 443
server {
    listen 80;
    server_name huangjingblog.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name huangjingblog.cn;

    ssl_certificate     /usr/local/nginx/ssl/huangjingblog.cn/huangjingblog.cn.pem;
    ssl_certificate_key /usr/local/nginx/ssl/huangjingblog.cn/huangjingblog.cn.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 所有请求统一反代到容器（容器内 Nginx 负责路由分发）
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 单独处理
    location /api/chat/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存（由容器内 Nginx 提供，宿主机层加缓存头）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }
}
