# 项目名称：gin-vue3-blog
# 文件名称：docker-compose.yml
# 创建时间：2026-03-18 16:12:00
#
# 系统用户：wyl
# 作　　者：無以菱
# 联系邮箱：huangjing510@126.com
# 功能描述：生产环境一体化容器编排，单镜像运行 Nginx + blog-backend + gitee-calendar-api，外部依赖 postgres + redis
#
# 使用说明：
#   模式一（新建数据库容器）：保持下方 postgres/redis 服务配置不变，直接 docker compose up -d
#   模式二（使用已有容器）：
#     1. 注释掉 postgres/redis 服务块
#     2. 注释掉 blog.depends_on 块
#     3. 取消注释 blog.environment 中的 DB_HOST / REDIS_HOST，填入已有容器的 IP 或主机名
#********************************************************************

services:
  # ----------------------------------------------------------------
  # 模式一：新建 PostgreSQL 容器（使用已有容器时注释此块）
  # ----------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: gin-vue3-blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "123456ok!"
      POSTGRES_DB: blogdb
      TZ: Asia/Shanghai
    volumes:
      - ./PgSqlData:/var/lib/postgresql/data
      - ../blog-backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  # ----------------------------------------------------------------
  # 模式一：新建 Redis 容器（使用已有容器时注释此块）
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gin-vue3-blog-redis
    restart: always
    command: redis-server --requirepass 123456 --appendonly yes
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./redisData:/data
    ports:
      - "6379:6379"

  blog:
    image: registry.cn-hangzhou.aliyuncs.com/wylhub/gin-vue3-blog:latest 
    container_name: gin-vue3-blog
    restart: unless-stopped
    # ----------------------------------------------------------------
    # 模式一：依赖新建容器（使用已有容器时注释此块）
    # ----------------------------------------------------------------
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:80"
    volumes:
      - ./backend-config:/app/config
      - ./backend-env/.env.config.prod:/app/.env.config.prod:ro
      #- ./backend-env/.env-gitee-calendar-api:/app/.env-gitee-calendar-api:ro # gitee api访问白名单（可选）
      - ./uploads:/app/uploads
      - ./logs:/var/log/gin-vue3-blog
    environment:
      TZ: Asia/Shanghai
      # ----------------------------------------------------------------
      # 模式二：使用已有容器时取消注释，填入已有容器的地址
      # ----------------------------------------------------------------
      # DB_HOST: 172.17.0.1
      # DB_PORT: "5432"
      # DB_PASSWORD: "123456ok!"
      # REDIS_HOST: 172.17.0.1
      # REDIS_PORT: "6379"
      # REDIS_PASSWORD: "123456"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
